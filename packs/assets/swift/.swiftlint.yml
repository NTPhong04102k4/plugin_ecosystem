# SwiftLint configuration — strict baseline shipped by skillrunner's `swift`
# pack (`sr apply-base --stack swift`). Install SwiftLint (brew/SPM plugin).
opt_in_rules:
  - empty_count
  - empty_string
  - force_unwrapping
  - first_where
  - contains_over_first_not_nil
  - closure_spacing
  - explicit_init
  - implicitly_unwrapped_optional
  - overridden_super_call
  - redundant_nil_coalescing
  - toggle_bool
  - unused_import
  - vertical_whitespace_closing_braces
  - weak_delegate

disabled_rules:
  - todo

analyzer_rules:
  - unused_declaration

excluded:
  - Pods
  - .build
  - "**/*.generated.swift"

line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 12
  error: 20

identifier_name:
  min_length: 2
  excluded: [id, x, y, i, to, up]
